# Apply manually after review:
#   kubectl apply -f k8s/tenant/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: startupos-tenant-db-credentials
  namespace: startupos
  labels:
    app: startupos
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: REPLACE_ME_WITH_RANDOM_32CHARS
  host: startupos-tenant-db-rw
---
apiVersion: v1
kind: Secret
metadata:
  name: startupos-tenant-secrets
  namespace: startupos
  labels:
    app: startupos
type: Opaque
stringData:
  # Odoo admin/master password (used internally for db management)
  odoo-master-pass: REPLACE_ME_WITH_RANDOM_32CHARS
