apiVersion: v1
kind: ConfigMap
metadata:
  name: startupos-tenant-odoo-config
  namespace: startupos
  labels:
    app: startupos
    component: odoo
data:
  odoo.conf.tmpl: |
    [options]
    addons_path = ${ODOO_ADDONS_PATH}
    data_dir = /var/lib/odoo
    admin_passwd = ${ODOO_MASTER_PASS}
    http_port = 8069
    proxy_mode = True
    workers = 4
    limit_memory_soft = 536870912
    limit_memory_hard = 1073741824
    limit_request = 8192
    limit_time_cpu = 60
    limit_time_real = 120
    max_cron_threads = 1
    log_level = info
    log_handler = :INFO
    without_demo = True
    list_db = False                          # hide DB selector from public
    dbfilter = ^%d$                          # route by subdomain
    db_name = False                          # disable /web/database/manager
    server_wide_modules = base,web
