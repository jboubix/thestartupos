apiVersion: apps/v1
kind: Deployment
metadata:
  name: startupos-tenant-odoo
  namespace: startupos
  labels:
    app: startupos
    component: odoo
    role: tenant
    version: "19.1"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: startupos
      component: odoo
      role: tenant
  template:
    metadata:
      labels:
        app: startupos
        component: odoo
        role: tenant
        version: "19.1"
    spec:
      initContainers:
        - name: render-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              PASS=$(cat /etc/secrets/odoo-master-pass)
              DB_PASS=$(cat /etc/db-credentials/password)
              # OCA repos in the image (matches docker/clone-oca.sh).
              # We can't enumerate /opt/oca here because the init container image is busybox,
              # not the Odoo image (init containers run before COPY applies).
              OCA="/opt/oca/web,/opt/oca/server-ux,/opt/oca/server-backend,/opt/oca/server-tools,/opt/oca/sale-workflow,/opt/oca/account-financial-tools,/opt/oca/account-financial-reporting,/opt/oca/account-reconcile,/opt/oca/bank-payment,/opt/oca/mis-builder,/opt/oca/partner-contact,/opt/oca/project,/opt/oca/hr,/opt/oca/hr-expense,/opt/oca/hr-timesheet,/opt/oca/helpdesk,/opt/oca/social,/opt/oca/knowledge,/opt/oca/survey,/opt/oca/stock-logistics-workflow,/opt/oca/purchase-workflow,/opt/oca/manufacture,/opt/oca/fleet,/opt/oca/tier-validation,/opt/oca/maintenance,/opt/oca/field-service,/opt/oca/queue,/opt/oca/currency"
              ADDONS="${OCA},/mnt/extra-addons/startupos,/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons"
              sed -e "s|__ODOO_MASTER_PASS__|${PASS}|g" \
                  -e "s|__DB_HOST__|startupos-tenant-db-rw.startupos.svc.cluster.local|g" \
                  -e "s|__DB_PASSWORD__|${DB_PASS}|g" \
                  -e "s|__ADDONS_PATH__|${ADDONS}|g" \
                  /config-template/odoo.conf > /config/odoo.conf
              echo "Built addons_path with $(echo $ADDONS | tr ',' '\n' | wc -l) entries"
          volumeMounts:
            - name: odoo-config-template
              mountPath: /config-template
            - name: odoo-config
              mountPath: /config
            - name: secrets
              mountPath: /etc/secrets
            - name: db-credentials
              mountPath: /etc/db-credentials
      containers:
        - name: odoo
          # Custom image: Odoo 19.0 + 28 OCA repos + 15 startupos_* modules.
          # Built locally and imported via `k3s ctr images import` (no GHCR needed).
          image: ghcr.io/jboubix/thestartupos-tenant-odoo:19.0
          imagePullPolicy: Never
          command:
            - odoo
          args:
            - --config=/config/odoo.conf
            - --proxy-mode
            - --db-filter=^%d$
            - --without-demo=True
          ports:
            - containerPort: 8069
              name: http
              protocol: TCP
            - containerPort: 8072
              name: longpoll
              protocol: TCP
          env:
            - name: HOST
              value: startupos-tenant-db-rw.startupos.svc.cluster.local
            - name: PORT
              value: "5432"
            - name: USER
              value: postgres
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: startupos-tenant-db-credentials
                  key: password
            - name: DB_NAME
              value: postgres
          volumeMounts:
            - name: odoo-data
              mountPath: /var/lib/odoo
              subPath: data
            - name: odoo-config
              mountPath: /config
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: odoo-data
          persistentVolumeClaim:
            claimName: startupos-tenant-odoo-data
        - name: odoo-config
          emptyDir: {}
        - name: odoo-config-template
          configMap:
            name: startupos-tenant-odoo-config
        - name: secrets
          secret:
            secretName: startupos-tenant-secrets
            items:
              - key: odoo-master-pass
                path: odoo-master-pass
        # DB credentials come from a separate secret (the CNPG one)
        # We also need it to read the password into the rendered config.
        - name: db-credentials
          secret:
            secretName: startupos-tenant-db-credentials
            items:
              - key: password
                path: password
