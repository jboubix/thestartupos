apiVersion: apps/v1
kind: Deployment
metadata:
  name: startupos-tenant-odoo
  namespace: startupos
  labels:
    app: startupos
    component: odoo
    role: tenant
    version: "19.1"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: startupos
      component: odoo
      role: tenant
  template:
    metadata:
      labels:
        app: startupos
        component: odoo
        role: tenant
        version: "19.1"
    spec:
      initContainers:
        - name: render-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              PASS=$(cat /etc/secrets/odoo-master-pass)
              sed "s|__ODOO_MASTER_PASS__|${PASS}|g" /config-template/odoo.conf > /config/odoo.conf
              echo "Rendered config:"
              head -5 /config/odoo.conf
          volumeMounts:
            - name: odoo-config-template
              mountPath: /config-template
            - name: odoo-config
              mountPath: /config
            - name: secrets
              mountPath: /etc/secrets
      containers:
        - name: odoo
          # Use stock odoo:19.0 (Odoo 19.0 is the published 19.x base; .1 is a minor patch).
          # Our custom image with OCA + startupos_* modules will replace this once built and pushed to GHCR.
          image: odoo:19.0
          imagePullPolicy: IfNotPresent
          command:
            - odoo
          args:
            - --config=/config/odoo.conf
            - --proxy-mode
            - --db-filter=^%d$
            - --without-demo=True
          ports:
            - containerPort: 8069
              name: http
              protocol: TCP
            - containerPort: 8072
              name: longpoll
              protocol: TCP
          env:
            - name: HOST
              value: startupos-tenant-db-rw.startupos.svc.cluster.local
            - name: PORT
              value: "5432"
            - name: USER
              value: postgres
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: startupos-tenant-db-credentials
                  key: password
            - name: DB_NAME
              value: postgres
          volumeMounts:
            - name: odoo-data
              mountPath: /var/lib/odoo
              subPath: data
            - name: odoo-config
              mountPath: /config
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: odoo-data
          persistentVolumeClaim:
            claimName: startupos-tenant-odoo-data
        - name: odoo-config
          emptyDir: {}
        - name: odoo-config-template
          configMap:
            name: startupos-tenant-odoo-config
        - name: secrets
          secret:
            secretName: startupos-tenant-secrets
