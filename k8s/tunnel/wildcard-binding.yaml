apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: startupos-wildcard
  namespace: startupos
  labels:
    app: startupos
    cfargotunnel.com/kind: TunnelBinding
tunnelRef:
  kind: ClusterTunnel
  name: global-tunnel
subjects:
  # Wildcard — every tenant subdomain routes to the multi-DB Odoo process.
  # The Host header carries the subdomain; Odoo --db-filter=%d resolves to the tenant DB.
  - name: startupos-tenant-odoo
    spec:
      fqdn: "*.thestartupos.com"
      http2Origin: false
      noTlsVerify: false
